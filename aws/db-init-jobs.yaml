apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-db-init-sql
  namespace: toggle-master
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS api_keys (
      id SERIAL PRIMARY KEY,
      name VARCHAR(100) NOT NULL,
      key_hash VARCHAR(64) NOT NULL UNIQUE,
      is_active BOOLEAN DEFAULT true,
      created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    INSERT INTO api_keys (name, key_hash, is_active)
    VALUES (
      'evaluation-service-key',
      'c709867c218606676b2b1ee84ea7afab71747c44c866fafb6cda36006aaf3656',
      true
    )
    ON CONFLICT (key_hash) DO NOTHING;
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: flag-db-init-sql
  namespace: toggle-master
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS flags (
      id SERIAL PRIMARY KEY,
      name VARCHAR(100) UNIQUE NOT NULL,
      description TEXT,
      is_enabled BOOLEAN NOT NULL DEFAULT false,
      created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE OR REPLACE FUNCTION trigger_set_timestamp()
    RETURNS TRIGGER AS $$
    BEGIN
      NEW.updated_at = NOW();
      RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    DROP TRIGGER IF EXISTS set_timestamp ON flags;

    CREATE TRIGGER set_timestamp
    BEFORE UPDATE ON flags
    FOR EACH ROW
    EXECUTE PROCEDURE trigger_set_timestamp();
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: targeting-db-init-sql
  namespace: toggle-master
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS targeting_rules (
      id SERIAL PRIMARY KEY,
      flag_name VARCHAR(100) UNIQUE NOT NULL,
      is_enabled BOOLEAN NOT NULL DEFAULT true,
      rules JSONB NOT NULL,
      created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE OR REPLACE FUNCTION trigger_set_timestamp()
    RETURNS TRIGGER AS $$
    BEGIN
      NEW.updated_at = NOW();
      RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    DROP TRIGGER IF EXISTS set_timestamp ON targeting_rules;

    CREATE TRIGGER set_timestamp
    BEFORE UPDATE ON targeting_rules
    FOR EACH ROW
    EXECUTE PROCEDURE trigger_set_timestamp();
---
apiVersion: batch/v1
kind: Job
metadata:
  name: auth-db-init
  namespace: toggle-master
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: psql
          image: postgres:16-alpine
          command: ["sh", "-c", "psql \"$DATABASE_URL\" -f /sql/init.sql"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: toggle-master-secrets
                  key: AUTH_DATABASE_URL
          volumeMounts:
            - name: sql
              mountPath: /sql
      volumes:
        - name: sql
          configMap:
            name: auth-db-init-sql
---
